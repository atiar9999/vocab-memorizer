<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON VOCAB AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2305070a%22/><text y=%22.9em%22 font-size=%2280%22 x=%225%22 fill=%22%2300f2ff%22 font-family=%22monospace%22 font-weight=%22bold%22>V</text><circle cx=%2270%22 cy=%2230%22 r=%2210%22 fill=%22%23bc13fe%22/></svg>">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.7);
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --pink: #ff00c8;
            --text: #e0e6ed;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Gradient Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(2px);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
            animation: fadeIn 1s ease-out;
        }

        /* --- Header --- */
        header { text-align: center; margin-bottom: 3rem; }
        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
            animation: titleZoom 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .subtitle { font-size: 0.9rem; opacity: 0.7; border-right: 2px solid var(--cyan); width: fit-content; margin: 0 auto; white-space: nowrap; overflow: hidden; padding-right: 5px; }

        /* --- UI Glassmorphism Panels --- */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--purple);
            border-radius: 8px;
            color: var(--cyan);
            padding: 1rem;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            margin-bottom: 1rem;
        }

        /* --- Buttons & Inputs --- */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
        }
        button.primary { background: linear-gradient(45deg, var(--cyan), var(--purple)); color: #000; border: none; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3); }
        button:active { transform: scale(0.95); }

        .search-bar {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            margin-bottom: 1.5rem;
        }

        /* --- The 3D Flip Card System --- */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .flip-card {
            background-color: transparent;
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
            animation: floatIn 0.6s ease forwards;
            opacity: 0;
        }

       .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    /* CHANGE THIS LINE TO 0s */
    transition: transform 0s; 
    transform-style: preserve-3d;
}

        /* Class toggled by JS */
        .is-flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-size: 1.2rem;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
        }

        .card-front { border-left: 4px solid var(--cyan); color: var(--cyan); }
        .card-back { border-left: 4px solid var(--pink); color: var(--pink); transform: rotateY(180deg); }

        /* Mode-Specific logic */
        .mode-eng .card-back { display: none; }
        .mode-bn .card-front { display: none; }
        .mode-bn .card-back { transform: rotateY(0deg); position: relative; }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes titleZoom { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes floatIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .pulse { animation: neonPulse 2s infinite alternate; }
        @keyframes neonPulse { from { box-shadow: 0 0 5px var(--cyan); } to { box-shadow: 0 0 20px var(--cyan); } }

        /* Hide logic */
        .hidden-node { display: none !important; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
    <header>
        <h1 id="main-title">NEON VOCAB AI</h1>
        <div class="subtitle" id="typewriter">SYSTEM INITIALIZED... READY TO SYNC.</div>
    </header>

    <div id="setup-area" class="glass-panel">
        <textarea id="input-data" placeholder="Word [Tab/Dash/Spaces] Meaning&#10;example: Ephemeral — lasting a short time&#10;Example: Myriad অগণিত"></textarea>
        <div class="btn-group">
            <button class="primary pulse" onclick="generateCards()">Generate Set</button>
            <button onclick="clearStorage()">Clear Memory</button>
        </div>
    </div>

    <div id="study-area" class="hidden-node">
        <div class="glass-panel">
            <input type="text" id="searchBar" class="search-bar" placeholder="Search decrypted words..." oninput="filterCards()">
            <div class="btn-group">
                <button onclick="setViewMode('flip')">🔄 Flip Mode</button>
                <button onclick="setViewMode('eng')">🌐 English</button>
                <button onclick="setViewMode('bn')">🌙 Bangla</button>
                <button onclick="toggleSetup()" style="margin-left: auto; border-color: var(--pink);">Edit List</button>
            </div>
        </div>
        
        <div id="word-list" class="word-grid"></div>
    </div>
</div>

<script>
let vocabulary = JSON.parse(localStorage.getItem('neon_vocab')) || [];
    let currentMode = 'eng'; // Default to English mode

    // 1. Particle Background Animation (Keep as is)
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5,
                color: Math.random() > 0.5 ? '#00f2ff' : '#bc13fe'
            });
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.speedX; p.y += p.speedY;
            if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
            if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animateParticles);
    }

    // 2. Logic: Parsing & Generation
    function generateCards() {
        const text = document.getElementById('input-data').value;
        if (!text.trim()) return;

        const lines = text.trim().split('\n');
        vocabulary = [];

        lines.forEach(line => {
            const parts = line.split(/[\t]|(?:\s{2,})|[—]|[-]/);
            if (parts.length >= 2) {
                vocabulary.push({
                    id: Date.now() + Math.random(),
                    eng: parts[0].trim(),
                    bn: parts.slice(1).join(' ').trim()
                });
            }
        });

        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('neon_vocab', JSON.stringify(vocabulary));
        renderList();
        document.getElementById('setup-area').classList.add('hidden-node');
        document.getElementById('study-area').classList.remove('hidden-node');
    }

    function renderList(filter = '') {
        const listContainer = document.getElementById('word-list');
        listContainer.innerHTML = '';

        vocabulary.forEach((item, index) => {
            if (filter && !item.eng.toLowerCase().includes(filter.toLowerCase()) && 
                !item.bn.toLowerCase().includes(filter.toLowerCase())) return;

            const card = document.createElement('div');
            card.className = `flip-card`;
          card.style.animation = 'none';
card.style.opacity = '1';
            
            // Logic for initial rotation based on mode
            let initialFlipClass = (currentMode === 'bn') ? 'is-flipped' : '';

            card.innerHTML = `
                <div class="flip-card-inner ${initialFlipClass}" id="inner-${index}">
                    <div class="card-front"><strong>${item.eng}</strong></div>
                    <div class="card-back">${item.bn}</div>
                </div>
            `;

            // Toggle flip on click regardless of mode
            card.onclick = () => {
                const inner = document.getElementById(`inner-${index}`);
                inner.classList.toggle('is-flipped');
            };

            listContainer.appendChild(card);
        });
    }

   function setViewMode(mode, btn) {
    currentMode = mode;
    // Visual feedback for buttons - clears all then highlights the active one
    document.querySelectorAll('.btn-group button').forEach(b => b.style.borderColor = 'var(--glass-border)');
    if(btn) btn.style.borderColor = 'var(--cyan)';
    
    renderList(document.getElementById('searchBar').value);
}

    function filterCards() {
        const val = document.getElementById('searchBar').value;
        renderList(val);
    }

    function toggleSetup() {
        document.getElementById('setup-area').classList.toggle('hidden-node');
        document.getElementById('study-area').classList.toggle('hidden-node');
    }

    function clearStorage() {
        if(confirm("Wipe memory banks?")) {
            localStorage.removeItem('neon_vocab');
            vocabulary = [];
            location.reload();
        }
    }

    window.onload = () => {
    initParticles();
    animateParticles();

    // Typewriter effect
    const sub = document.getElementById('typewriter');
    const text = sub.innerText;
    sub.innerText = '';
    let i = 0;
    function type() {
        if (i < text.length) {
            sub.innerText += text.charAt(i);
            i++;
            setTimeout(type, 50);
        }
    }
    type();

    if (vocabulary.length > 0) {
        renderList();
        document.getElementById('setup-area').classList.add('hidden-node');
        document.getElementById('study-area').classList.remove('hidden-node');
    }
};
    window.onresize = initParticles;
</script>

</body>
</html>
